name: Green CI Metrics

on:
  push:
    branches:
      - main

jobs:
  green-metrics:
    runs-on: ubuntu-latest

    env:
      GREEN_METRICS_URL: ${{ secrets.GREEN_METRICS_URL }}
      GREEN_METRICS_TOKEN: ${{ secrets.GREEN_METRICS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install backend dependencies and send metric
        working-directory: backend
        run: |
          start=$(date +%s)

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          end=$(date +%s)
          duration=$((end - start))

          curl --fail --show-error --silent -X POST "$GREEN_METRICS_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GREEN_METRICS_TOKEN" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"duration\": $duration,
              \"runner_type\": \"${{ runner.os }}\",
              \"metric_type\": \"ci_step\",
              \"step_name\": \"backend_dependency_install\",
              \"phase\": \"dependencies\"
            }"

      - name: Install frontend dependencies and send metric
        working-directory: frontend
        run: |
          start=$(date +%s)

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          end=$(date +%s)
          duration=$((end - start))

          curl --fail --show-error --silent -X POST "$GREEN_METRICS_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GREEN_METRICS_TOKEN" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"duration\": $duration,
              \"runner_type\": \"${{ runner.os }}\",
              \"metric_type\": \"ci_step\",
              \"step_name\": \"frontend_dependency_install\",
              \"phase\": \"dependencies\"
            }"

      - name: Build backend and send metric
        working-directory: backend
        run: |
          start=$(date +%s)

          if npm run | grep -q " build"; then
            npm run build
          else
            npm run --if-present lint
          fi

          end=$(date +%s)
          duration=$((end - start))

          curl --fail --show-error --silent -X POST "$GREEN_METRICS_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GREEN_METRICS_TOKEN" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"duration\": $duration,
              \"runner_type\": \"${{ runner.os }}\",
              \"metric_type\": \"ci_step\",
              \"step_name\": \"backend_build\",
              \"phase\": \"build\"
            }"

      - name: Build frontend and send metric
        working-directory: frontend
        run: |
          start=$(date +%s)

          if npm run | grep -q " build"; then
            npm run build
          else
            npm run --if-present lint
          fi

          end=$(date +%s)
          duration=$((end - start))

          curl --fail --show-error --silent -X POST "$GREEN_METRICS_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GREEN_METRICS_TOKEN" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"duration\": $duration,
              \"runner_type\": \"${{ runner.os }}\",
              \"metric_type\": \"ci_step\",
              \"step_name\": \"frontend_build\",
              \"phase\": \"build\"
            }"

      - name: Runtime smoke test and send metric
        run: |
          start=$(date +%s)

          cd backend
          npm run dev &
          BACKEND_PID=$!

          cd ../frontend
          npm run dev -- --host 127.0.0.1 --port 5173 &
          FRONTEND_PID=$!

          success=0

          for i in {1..30}; do
            if curl --silent --fail http://127.0.0.1:5173 > /dev/null; then
              echo "Frontend is responding"
              success=1
              break
            fi
            sleep 1
          done

          kill $FRONTEND_PID $BACKEND_PID || true

          end=$(date +%s)
          duration=$((end - start))

          curl --fail --show-error --silent -X POST "$GREEN_METRICS_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GREEN_METRICS_TOKEN" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"duration\": $duration,
              \"runner_type\": \"${{ runner.os }}\",
              \"metric_type\": \"ci_step\",
              \"step_name\": \"runtime_smoke_test\",
              \"phase\": \"runtime\"
            }"

          if [ "$success" -ne 1 ]; then
            exit 1
          fi